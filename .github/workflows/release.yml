name: "Compilacion N5 Tauri (Moset IDE)"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  tauri-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            args: ''
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            args: ''
            target: x86_64-apple-darwin
          - os: macos-latest
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
          - os: windows-latest
            args: ''
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Configure NPM dependencies (Monorepo root)
        working-directory: moset-ecosystem/naraka-ide
        run: npm install

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            moset-ecosystem/naraka-ide/src-tauri -> target

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: moset-ecosystem/naraka-ide
          tagName: moset-v__VERSION__
          releaseName: "Moset Studio v__VERSION__"
          releaseBody: "Actualización Inteligencia Soberana de Naraka Studio."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
