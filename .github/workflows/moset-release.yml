name: "Moset Multi-OS Release Pipeline"
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            args: ''
            target: x86_64-apple-darwin
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
          - platform: windows-latest
            args: ''
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Frontend Dependencies
        working-directory: moset-ide
        run: npm install

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            moset-ide/src-tauri -> target

      - name: Build and Publish Tauri Platform Assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: "moset-ide"
          tagName: ${{ github.ref_name }}
          releaseName: "Moset ${{ github.ref_name }}"
          releaseBody: "Moset — Motor Soberano de Desarrollo. Release oficial multiplataforma."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
