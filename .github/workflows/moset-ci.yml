name: Moset Cross-OS Build Check

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_core_engine:
    name: Build Core Engine (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo Dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: moset-ecosystem/core-engine

    - name: Check Compilation (No CUDA - Cross Platform)
      # Esto chequea que el motor compila en CPU sin requerir la suite de CUDA instalada en los runners
      run: cargo check --manifest-path moset-ecosystem/core-engine/Cargo.toml

    - name: Build Core Engine (Release)
      run: cargo build --release --manifest-path moset-ecosystem/core-engine/Cargo.toml

  build_ide_backend:
    name: Build IDE Tauri Backend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

    - name: Check Tauri Backend Compilation
      # Asegura que el backend de Tauri compila nativamente y conecta con Webview cruzado
      run: cargo check --manifest-path moset-ecosystem/naraka-ide/src-tauri/Cargo.toml
