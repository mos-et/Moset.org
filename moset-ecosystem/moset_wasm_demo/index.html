<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moset Engine - WebAssembly Web Demo</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 2rem; width: 600px; max-width: 90%; }
        h1 { font-weight: 300; margin-top: 0; color: #4facfe; }
        textarea { width: 100%; height: 150px; background: rgba(0,0,0,0.3); color: #0f0; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 1rem; font-family: monospace; resize: none; margin-bottom: 1rem; box-sizing: border-box;}
        button { background: linear-gradient(135deg, #4facfe, #00f2fe); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4); }
        .output { background: #111; padding: 1rem; border-radius: 8px; min-height: 50px; border: 1px solid #333; font-family: monospace; white-space: pre-wrap; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="glass-panel">
        <h1>Naraka Studio: Moset Web</h1>
        <p>El motor Moset en WebAssembly, ejecutándose nativamente en el navegador sin backend.</p>
        
        <textarea id="codigo">
:@ Ejemplo en Moset
mostrar "¡Hola desde WebAssembly!"

a = 10
b = 5
z = a + b

mostrar "El resultado de la suma es:"
mostrar z
        </textarea>
        
        <button id="btn-ejecutar">Ejecutar Código</button>
        
        <div class="output" id="output">Cargando motor de WebAssembly...</div>
    </div>

    <script type="module">
        import init, { run_moset_wasm } from './pkg/moset_core.js';

        async function initWasm() {
            const out = document.getElementById('output');
            try {
                await init();
                out.innerText = "Motor listo. Presiona 'Ejecutar Código'.";
                out.style.color = '#888';
                
                document.getElementById('btn-ejecutar').addEventListener('click', () => {
                    out.innerText = "Ejecutando...";
                    out.style.color = 'white';
                    const code = document.getElementById('codigo').value;
                    try {
                        const t0 = performance.now();
                        // Ejecuta en Español por defecto en esta demo
                        const result = run_moset_wasm(code, "es");
                        const t1 = performance.now();
                        out.innerText = result + `\n\n[Ejecutado en ${(t1 - t0).toFixed(2)} ms]`;
                        out.style.color = '#0f0'; // Success
                    } catch (e) {
                        out.innerText = "Error Wasm: " + e;
                        out.style.color = '#f55'; // Error
                    }
                });
            } catch (err) {
                out.innerText = "Error cargando WASM:\n" + err;
                out.style.color = '#f55';
            }
        }
        
        initWasm();
    </script>
</body>
</html>
